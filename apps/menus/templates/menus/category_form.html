{% extends "base.html" %}
{% block title %}{{ action }} une catégorie{% endblock %}
{% block content %}
<nav class="qm-navbar">
    <div class="max-w-2xl mx-auto px-4 py-3">
        <a href="{% url 'menus:category_list' %}" class="qm-back-link"><i class="fas fa-arrow-left"></i> Retour</a>
    </div>
</nav>
<div class="max-w-2xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-extrabold text-gray-800 mb-6">{{ action }} une catégorie</h1>
    <div class="qm-card p-6">
        <form method="POST" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Nom *</label>
                {{ form.name }}
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Description</label>
                {{ form.description }}
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Ordre d'affichage</label>
                {{ form.order }}
            </div>
            <label class="flex items-center gap-2.5 pt-2">
                {{ form.is_active }}
                <span class="text-sm font-medium text-gray-700">Catégorie active (visible sur le menu public)</span>
            </label>
            <button type="submit" class="qm-btn qm-btn-primary w-full py-3.5 mt-2">
                <i class="fas fa-check"></i> {{ action }}
            </button>
        </form>
    </div>
</div>
{% endblock %}
