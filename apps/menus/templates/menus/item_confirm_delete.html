{% extends "base.html" %}
{% block title %}Supprimer {{ item.name }}{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4" style="background: linear-gradient(135deg, #fef2f2, #f8f9fc);">
    <div class="qm-card p-8 max-w-md w-full text-center qm-animate">
        <div class="w-16 h-16 rounded-2xl bg-red-50 text-red-500 flex items-center justify-center mx-auto mb-5 text-2xl">
            <i class="fas fa-trash"></i>
        </div>
        <h1 class="text-xl font-extrabold text-gray-800 mb-2">Supprimer ce plat ?</h1>
        <p class="text-gray-600 mb-1"><strong>{{ item.name }}</strong></p>
        <p class="text-indigo-600 font-bold mb-7">{{ item.price }}€</p>
        <form method="POST" class="flex gap-3 justify-center">
            {% csrf_token %}
            <a href="{% url 'menus:item_list' %}" class="qm-btn qm-btn-secondary flex-1">Annuler</a>
            <button type="submit" class="qm-btn qm-btn-danger-solid flex-1">
                <i class="fas fa-trash"></i> Supprimer
            </button>
        </form>
    </div>
</div>
{% endblock %}
