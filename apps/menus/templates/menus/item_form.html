{% extends "base.html" %}
{% block title %}{{ action }} un plat{% endblock %}
{% block content %}
<nav class="qm-navbar">
    <div class="max-w-2xl mx-auto px-4 py-3">
        <a href="{% url 'menus:item_list' %}" class="qm-back-link"><i class="fas fa-arrow-left"></i> Retour</a>
    </div>
</nav>
<div class="max-w-2xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-extrabold text-gray-800 mb-6">{{ action }} un plat</h1>
    <div class="qm-card p-6">
        <form method="POST" enctype="multipart/form-data" class="space-y-5">
            {% csrf_token %}
            <div><label class="block text-sm font-semibold text-gray-700 mb-1.5">Catégorie *</label>{{ form.category }}</div>
            <div><label class="block text-sm font-semibold text-gray-700 mb-1.5">Nom *</label>{{ form.name }}</div>
            <div><label class="block text-sm font-semibold text-gray-700 mb-1.5">Description</label>{{ form.description }}</div>
            <div><label class="block text-sm font-semibold text-gray-700 mb-1.5">Prix (€) *</label>{{ form.price }}</div>
            <div><label class="block text-sm font-semibold text-gray-700 mb-1.5">Photo</label>{{ form.image }}</div>
            <div><label class="block text-sm font-semibold text-gray-700 mb-1.5">Allergènes</label>{{ form.allergens }}</div>
            <div><label class="block text-sm font-semibold text-gray-700 mb-1.5">Ordre d'affichage</label>{{ form.order }}</div>

            <div class="border-t border-gray-100 pt-4 space-y-3">
                <label class="flex items-center gap-2.5">{{ form.is_available }}<span class="text-sm font-medium text-gray-700">Disponible à la vente</span></label>
                <label class="flex items-center gap-2.5">{{ form.is_vegetarian }}<span class="text-sm font-medium text-gray-700">🌱 Végétarien</span></label>
                <label class="flex items-center gap-2.5">{{ form.is_vegan }}<span class="text-sm font-medium text-gray-700">🌿 Végan</span></label>
                <label class="flex items-center gap-2.5">{{ form.is_gluten_free }}<span class="text-sm font-medium text-gray-700">🌾 Sans gluten</span></label>
            </div>

            <button type="submit" class="qm-btn qm-btn-primary w-full py-3.5 mt-2">
                <i class="fas fa-check"></i> {{ action }}
            </button>
        </form>
    </div>
</div>
{% endblock %}
